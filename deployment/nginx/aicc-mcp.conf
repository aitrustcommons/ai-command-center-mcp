# Nginx configuration for AiCC MCP Server
# Domain: mcp.theintentlayer.com
# Pattern: host-level nginx + certbot SSL, proxy to Docker container

# Rate limiting zone (brute-force protection for API key guessing)
# Add to /etc/nginx/nginx.conf http block:
#   limit_req_zone $binary_remote_addr zone=mcp:10m rate=30r/m;

server {
    listen 80;
    server_name mcp.theintentlayer.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mcp.theintentlayer.com;

    # SSL certificates (managed by certbot)
    ssl_certificate /etc/letsencrypt/live/mcp.theintentlayer.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.theintentlayer.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Rate limiting
    limit_req zone=mcp burst=10 nodelay;

    # Proxy to MCP server container
    location / {
        proxy_pass http://127.0.0.1:8443;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE/streaming support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Timeouts for long-running MCP operations
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Health check (no rate limiting)
    location /health {
        limit_req off;
        proxy_pass http://127.0.0.1:8443/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        return 404;
    }
}
